<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOMA — Apprendre l'Arabe des Comores | Abdou Chakour Ali</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,700;0,900&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ocean:#061520; --deep:#0d2135; --teal:#1a7a70; --teal2:#24a898;
  --gold:#c9913a; --gold2:#f0c060; --sand:#f2e8d4;
  --coral:#c4503a; --green:#2d7a45; --linen:#fdf8f0;
  --text:#1a1208; --mid:#5a4a30;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--linen);color:var(--text);overflow-x:hidden}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--ocean)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;justify-content:space-between;align-items:center;padding:14px 40px;background:rgba(6,21,32,.96);backdrop-filter:blur(14px);border-bottom:1px solid rgba(201,145,58,.18)}
.nav-right{display:flex;gap:14px;align-items:center}
.nav-stat{font-size:.76rem;color:rgba(242,232,212,.45);display:flex;align-items:center;gap:6px}
.dot-live{width:7px;height:7px;border-radius:50%;background:#4caf50;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn-login{background:transparent;border:1px solid rgba(201,145,58,.5);color:var(--gold2);padding:8px 20px;border-radius:22px;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .25s}
.btn-login:hover{background:var(--gold);color:var(--ocean)}
.user-bar{display:none;align-items:center;gap:10px}
.user-bar.visible{display:flex}
.user-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--gold));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.78rem;color:white}
.user-name{font-size:.8rem;color:rgba(242,232,212,.7);font-weight:600}
.btn-logout{background:transparent;border:none;color:rgba(242,232,212,.3);font-size:.72rem;cursor:pointer;padding:3px 8px;border-radius:5px;transition:all .2s}
.btn-logout:hover{color:var(--coral)}

/* HERO */
.hero{min-height:100vh;background:var(--ocean);display:flex;align-items:center;position:relative;overflow:hidden;padding-top:80px}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 65% 45%,rgba(26,122,112,.16) 0%,transparent 60%),radial-gradient(ellipse 40% 70% at 15% 85%,rgba(201,145,58,.1) 0%,transparent 50%)}
.hero-pattern{position:absolute;inset:0;opacity:.025;background-image:repeating-linear-gradient(45deg,rgba(201,145,58,1) 0,rgba(201,145,58,1) 1px,transparent 0,transparent 50%),repeating-linear-gradient(-45deg,rgba(201,145,58,1) 0,rgba(201,145,58,1) 1px,transparent 0,transparent 50%);background-size:38px 38px}
.float-ar{position:absolute;font-family:'Amiri',serif;pointer-events:none;user-select:none;color:rgba(201,145,58,.05);animation:floatAr 14s ease-in-out infinite}
@keyframes floatAr{0%,100%{transform:translateY(0)}50%{transform:translateY(-28px)}}
.hero-inner{position:relative;z-index:2;padding:0 72px;max-width:700px}
.hero-eyebrow{font-family:'Cormorant Garamond',serif;font-size:.86rem;letter-spacing:.4em;text-transform:uppercase;color:var(--teal2);margin-bottom:18px;animation:fadeUp .9s ease both}
.hero-fr2{font-family:'Cormorant Garamond',serif;font-size:clamp(1.4rem,2.5vw,2rem);color:rgba(242,232,212,.75);font-style:italic;animation:fadeUp .9s .2s ease both;margin-bottom:22px}
.hero-desc{font-size:.98rem;color:rgba(242,232,212,.58);line-height:1.78;max-width:520px;animation:fadeUp .9s .35s ease both;margin-bottom:36px}
.hero-free-badge{display:inline-flex;align-items:center;gap:10px;background:rgba(45,122,69,.18);border:1px solid rgba(45,122,69,.38);color:#6dcf8a;padding:9px 20px;border-radius:28px;font-size:.85rem;font-weight:700;margin-bottom:28px;animation:fadeUp .9s .5s ease both}
.hero-ctas{display:flex;gap:12px;flex-wrap:wrap;animation:fadeUp .9s .6s ease both}
.btn-start{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ocean);padding:14px 36px;border-radius:36px;font-weight:700;font-size:.92rem;border:none;cursor:pointer;transition:all .3s;box-shadow:0 8px 26px rgba(201,145,58,.4)}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 14px 38px rgba(201,145,58,.5)}
.btn-see{background:transparent;color:rgba(242,232,212,.72);padding:14px 28px;border-radius:36px;border:1px solid rgba(242,232,212,.2);font-size:.92rem;font-weight:600;cursor:pointer;transition:all .3s}
.btn-see:hover{border-color:var(--gold2);color:var(--gold2)}
@keyframes fadeUp{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}

.hero-progress{position:absolute;bottom:0;left:0;right:0;background:rgba(255,255,255,.03);border-top:1px solid rgba(201,145,58,.1);padding:18px 72px;display:flex;align-items:center;gap:20px}
.progress-label{font-size:.74rem;color:rgba(242,232,212,.38);letter-spacing:.1em;white-space:nowrap}
.progress-track{flex:1;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--gold));border-radius:2px;transition:width .6s ease}
.progress-note{font-size:.76rem;color:var(--gold);white-space:nowrap}

/* STATS */
.stats-bar{background:var(--deep);border-top:1px solid rgba(201,145,58,.1);border-bottom:1px solid rgba(201,145,58,.1);padding:24px 72px;display:flex;justify-content:space-around;flex-wrap:wrap;gap:20px}
.stat{text-align:center}
.stat-n{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:700;color:var(--gold2);line-height:1}
.stat-l{font-size:.72rem;color:rgba(242,232,212,.4);letter-spacing:.14em;text-transform:uppercase;margin-top:4px}

/* CURRICULUM */
.curriculum{padding:80px 72px;background:var(--linen)}
.section-ey{font-family:'Cormorant Garamond',serif;font-size:.8rem;letter-spacing:.4em;text-transform:uppercase;color:var(--teal);margin-bottom:10px}
.section-tt{font-family:'Playfair Display',serif;font-size:clamp(1.7rem,3.2vw,2.6rem);color:var(--text);line-height:1.2;margin-bottom:10px}
.section-tt .ar{font-family:'Amiri',serif;color:var(--gold);font-size:.85em;display:block;margin-bottom:5px}
.section-sub{font-size:.92rem;color:var(--mid);line-height:1.7;max-width:560px;margin-bottom:50px}

/* Phase labels */
.phase-header{display:flex;align-items:center;gap:14px;margin-bottom:18px;margin-top:44px}
.phase-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(26,122,112,.3),transparent)}
.phase-badge{padding:5px 16px;border-radius:18px;font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
.ph1{background:rgba(45,122,69,.14);color:#5dba7d;border:1px solid rgba(45,122,69,.28)}
.ph2{background:rgba(26,122,112,.14);color:var(--teal2);border:1px solid rgba(26,122,112,.28)}
.ph3{background:rgba(201,145,58,.14);color:var(--gold2);border:1px solid rgba(201,145,58,.28)}
.ph4{background:rgba(196,80,58,.14);color:#e87060;border:1px solid rgba(196,80,58,.28)}

/* Lesson cards */
.lessons-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.lcard{background:white;border-radius:13px;padding:20px 22px;border:1px solid rgba(26,122,112,.1);cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.lcard::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%}
.lcard.ph1c::before{background:linear-gradient(180deg,#5dba7d,#24a898)}
.lcard.ph2c::before{background:linear-gradient(180deg,var(--teal),var(--teal2))}
.lcard.ph3c::before{background:linear-gradient(180deg,var(--gold),var(--gold2))}
.lcard.ph4c::before{background:linear-gradient(180deg,#e87060,#c45030)}
.lcard:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(26,122,112,.12);border-color:transparent}
.lcard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px}
.lnum{font-size:.7rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--teal)}
.part-badge{padding:2px 9px;border-radius:8px;font-size:.65rem;font-weight:700;background:rgba(201,145,58,.12);color:var(--gold);border:1px solid rgba(201,145,58,.25)}
.lar{font-family:'Amiri',serif;font-size:1.55rem;direction:rtl;text-align:right;color:var(--text);line-height:1.25;margin-bottom:5px}
.lfr{font-size:.82rem;color:var(--mid);line-height:1.5;margin-bottom:12px}
.ltags{display:flex;gap:5px;flex-wrap:wrap}
.ltag{padding:2px 8px;border-radius:7px;font-size:.65rem;font-weight:700}
.tg{background:rgba(26,122,112,.1);color:var(--teal)}
.to{background:rgba(201,145,58,.1);color:var(--gold)}
.tr{background:rgba(196,80,58,.1);color:var(--coral)}
.tv{background:rgba(45,122,69,.1);color:var(--green)}

/* VIEWER */
.viewer-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(6,21,32,.97);backdrop-filter:blur(10px);overflow-y:auto}
.viewer-overlay.open{display:block}
.viewer-inner{max-width:920px;margin:0 auto;padding:36px 28px 80px}
.viewer-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px}
.vback{background:rgba(242,232,212,.07);border:1px solid rgba(242,232,212,.14);color:var(--sand);padding:9px 20px;border-radius:22px;font-size:.82rem;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:7px}
.vback:hover{background:rgba(242,232,212,.13)}
.vprog{font-size:.75rem;color:rgba(242,232,212,.38)}

.vheader{margin-bottom:40px;padding-bottom:28px;border-bottom:1px solid rgba(201,145,58,.14)}
.vtag{display:inline-block;padding:4px 13px;border-radius:10px;font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(242,232,212,.65)}
.vnum{font-size:.76rem;color:var(--gold);letter-spacing:.2em;text-transform:uppercase;font-weight:700;margin-bottom:8px}
.var-big{font-family:'Amiri',serif;font-size:2.8rem;color:var(--gold2);line-height:1;margin-bottom:7px;text-shadow:0 0 36px rgba(240,192,96,.28)}
.vfr{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-style:italic;color:rgba(242,232,212,.6)}

/* Part tabs (A B C) */
.part-tabs{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap}
.ptab{padding:8px 22px;border-radius:22px;border:1px solid rgba(242,232,212,.15);color:rgba(242,232,212,.6);font-size:.82rem;font-weight:700;cursor:pointer;transition:all .25s;background:transparent;letter-spacing:.06em}
.ptab.active{background:var(--gold);color:var(--ocean);border-color:var(--gold)}
.ptab:hover:not(.active){border-color:var(--gold2);color:var(--gold2)}

.part-panel{display:none}
.part-panel.visible{display:block}

/* Section inside viewer */
.vsec{margin-bottom:40px}
.vsec-title{font-family:'Playfair Display',serif;font-size:.96rem;color:var(--teal2);border-bottom:1px solid rgba(36,168,152,.14);padding-bottom:9px;margin-bottom:20px;display:flex;align-items:center;gap:9px}
.vsec-title::before{content:'◆';font-size:.52em;color:var(--gold)}

/* ══ HURUF GRID — RIGHT TO LEFT ══ */
.huruf-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  direction:rtl;          /* ← ا starts top-right */
  gap:10px;
}
@media(max-width:600px){.huruf-grid{grid-template-columns:repeat(4,1fr)}}

.huruf-card{
  background:rgba(13,33,53,.9);
  border:1px solid rgba(201,145,58,.22);
  border-radius:13px;
  aspect-ratio:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-family:'Amiri',serif;
  font-size:2.5rem;
  color:var(--sand);
  position:relative;
  transition:all .25s;
  cursor:pointer;
  direction:rtl;
  user-select:none;
}
.huruf-card:hover{background:rgba(201,145,58,.15);border-color:var(--gold);transform:scale(1.06)}
.huruf-card:active{transform:scale(.97)}

/* 🔊 vocal button inside each card */
.vocal-btn{
  position:absolute;bottom:5px;right:6px;
  background:rgba(201,145,58,.2);
  border:none;border-radius:50%;
  width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:.7rem;
  transition:all .2s;color:var(--gold2);
  padding:0;
}
.vocal-btn:hover{background:var(--gold);color:var(--ocean)}
.vocal-btn.speaking{background:var(--teal);animation:speakPulse .6s ease infinite}
@keyframes speakPulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Words grid */
.words-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:11px}
.word-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:16px 10px;text-align:center;transition:all .25s;cursor:pointer;position:relative}
.word-card:hover{background:rgba(26,122,112,.15);border-color:var(--teal);transform:scale(1.03)}
.wcar{font-family:'Amiri',serif;font-size:1.85rem;color:var(--sand);direction:rtl;line-height:1.25;margin-bottom:5px}
.wcfr{font-size:.72rem;color:rgba(242,232,212,.48)}
.word-vocal{position:absolute;top:5px;right:6px;background:rgba(201,145,58,.18);border:none;border-radius:50%;width:20px;height:20px;font-size:.62rem;cursor:pointer;color:var(--gold2);display:flex;align-items:center;justify-content:center;transition:all .2s}
.word-vocal:hover{background:var(--gold);color:var(--ocean)}

/* Pairs */
.pairs-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.pair-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06);border-right:3px solid var(--gold);border-radius:10px;padding:14px;direction:rtl;cursor:pointer;transition:all .2s}
.pair-card:hover{background:rgba(26,122,112,.13);border-right-color:var(--teal)}
.pair-card:active{transform:scale(.98)}
.pair-ar-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.par{font-family:'Amiri',serif;font-size:1.2rem;color:var(--sand);line-height:1.45;flex:1}
.pfr{font-size:.78rem;color:rgba(242,232,212,.48);margin-top:6px;direction:ltr;text-align:left}
.pair-vocal-btn{
  background:rgba(201,145,58,.18);border:none;border-radius:50%;
  width:26px;height:26px;font-size:.72rem;cursor:pointer;
  color:var(--gold2);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;padding:0;
}
.pair-vocal-btn:hover{background:var(--gold);color:var(--ocean);transform:scale(1.15)}
.pair-vocal-btn.speaking{background:var(--teal);color:white;animation:speakPulse .6s ease infinite}

/* Section title row + section play button */
.vsec-title-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
.vsec-title-row .vsec-title{margin-bottom:0}
.sec-play-btn{
  background:linear-gradient(135deg,rgba(26,122,112,.35),rgba(26,122,112,.2));
  border:1px solid rgba(36,168,152,.5);
  color:#6de8d8;border-radius:22px;padding:7px 16px;
  font-size:.78rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .25s;
  display:flex;align-items:center;gap:6px;touch-action:manipulation;
}
.sec-play-btn:active{transform:scale(.95)}
.sec-play-btn.speaking{background:linear-gradient(135deg,var(--teal),#1a5a55);border-color:var(--teal2);color:white;animation:speakPulse .8s ease infinite}

/* Play-all bar (top of lesson) */
.play-all-bar{
  display:flex;align-items:center;gap:14px;
  background:linear-gradient(135deg,rgba(201,145,58,.14),rgba(201,145,58,.06));
  border:1px solid rgba(201,145,58,.35);
  border-radius:16px;padding:16px 20px;margin-bottom:24px;
}
.play-all-btn{
  background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ocean);
  border:none;border-radius:28px;padding:12px 28px;
  font-size:.9rem;font-weight:800;cursor:pointer;letter-spacing:.02em;
  transition:all .25s;white-space:nowrap;flex-shrink:0;
  box-shadow:0 4px 18px rgba(201,145,58,.4);touch-action:manipulation;
}
.play-all-btn:active{transform:scale(.96)}
.play-all-btn.speaking{
  background:linear-gradient(135deg,var(--teal),#1a5a55);
  color:white;box-shadow:0 4px 18px rgba(26,122,112,.5);
  animation:speakPulse .8s ease infinite;
}
.play-all-hint{font-size:.75rem;color:rgba(242,232,212,.5);line-height:1.5}

/* Per-phrase audio button — big, visible on mobile */
.pair-vocal-btn{
  background:linear-gradient(135deg,rgba(201,145,58,.25),rgba(201,145,58,.12));
  border:1px solid rgba(201,145,58,.4);border-radius:50%;
  width:36px;height:36px;font-size:.9rem;cursor:pointer;
  color:var(--gold2);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;padding:0;touch-action:manipulation;
}
.pair-vocal-btn:active{background:var(--gold);color:var(--ocean);transform:scale(.9)}
.pair-vocal-btn.speaking{
  background:linear-gradient(135deg,var(--teal),#24a898);
  color:white;border-color:var(--teal2);
  animation:speakRing .7s ease infinite;
}
@keyframes speakRing{
  0%{box-shadow:0 0 0 0 rgba(36,168,152,.6)}
  70%{box-shadow:0 0 0 10px rgba(36,168,152,0)}
  100%{box-shadow:0 0 0 0 rgba(36,168,152,0)}
}

/* Homework */
.hw-box{background:rgba(26,122,112,.1);border:1px solid rgba(36,168,152,.18);border-radius:13px;padding:20px 22px;display:flex;gap:14px;align-items:flex-start;margin-bottom:28px}
.hw-ico{font-size:1.7rem;flex-shrink:0}
.hw-lbl{font-size:.72rem;font-weight:700;color:var(--teal2);text-transform:uppercase;letter-spacing:.12em;margin-bottom:5px}
.hw-txt{font-size:.88rem;color:rgba(242,232,212,.72);line-height:1.65}

/* AI section */
.ai-section{background:rgba(201,145,58,.07);border:1px solid rgba(201,145,58,.2);border-radius:15px;padding:24px;margin-top:12px}
.ai-title{font-family:'Playfair Display',serif;font-size:.96rem;color:var(--gold2);margin-bottom:5px;display:flex;align-items:center;gap:9px}
.ai-sub{font-size:.8rem;color:rgba(242,232,212,.48);margin-bottom:16px;line-height:1.6}
.ai-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.ai-input{flex:1;min-width:160px;background:rgba(255,255,255,.07);border:1px solid rgba(242,232,212,.14);color:var(--sand);padding:11px 14px;border-radius:9px;font-family:'Amiri',serif;font-size:1.15rem;direction:rtl;outline:none;transition:border .25s}
.ai-input:focus{border-color:var(--gold)}
.ai-input::placeholder{color:rgba(242,232,212,.28);font-size:.95rem}
.ai-btn{background:var(--gold);color:var(--ocean);padding:11px 22px;border-radius:9px;border:none;font-weight:700;font-size:.82rem;cursor:pointer;white-space:nowrap;transition:all .25s}
.ai-btn:hover{background:var(--gold2)}
.ai-btn:disabled{opacity:.45;cursor:wait}
.ai-voice-btn{background:rgba(26,122,112,.25);color:var(--teal2);padding:11px 16px;border-radius:9px;border:1px solid rgba(36,168,152,.3);font-size:1rem;cursor:pointer;transition:all .25s;white-space:nowrap}
.ai-voice-btn:hover{background:var(--teal);color:white}
.ai-voice-btn.listening{background:var(--coral);color:white;border-color:var(--coral);animation:speakPulse .8s infinite}
.ai-result{background:rgba(255,255,255,.05);border-radius:9px;padding:16px;font-size:.88rem;color:rgba(242,232,212,.84);line-height:1.7;border-left:3px solid var(--gold);display:none}
.ai-result.visible{display:block}
.ai-spinner{display:none;text-align:center;padding:16px;color:rgba(242,232,212,.38);font-size:.82rem}
.ai-spinner.visible{display:block}

/* LOGIN MODAL */
.login-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(6,21,32,.96);backdrop-filter:blur(16px);align-items:center;justify-content:center;padding:20px}
.login-overlay.open{display:flex}
.login-box{background:linear-gradient(145deg,#0d2135,#061520);border:1px solid rgba(201,145,58,.24);border-radius:22px;padding:44px;max-width:420px;width:100%;position:relative}
.login-close{position:absolute;top:14px;right:18px;background:rgba(242,232,212,.07);border:none;color:rgba(242,232,212,.55);width:32px;height:32px;border-radius:50%;font-size:1rem;cursor:pointe
